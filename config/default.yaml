# Default run configuration. Override any field with --set key=value on the CLI.

input:
  # CSV of domains to scan. See ingest/dotgov.py for the expected columns.
  domains_csv: data/raw/current-federal.csv
  # Which hostnames to try per domain.
  hostname_variants: ["apex", "www"]

probe:
  openssl_bin: openssl        # can be overridden by PQR_OPENSSL_BIN
  port: 443
  connect_timeout_s: 10
  # Extra attempts for transient failures (timeout / TCP error) before an
  # endpoint is recorded unreachable. 0 disables retries.
  retries: 1
  # Client profiles used for the dual-probe. Defined in probe/profiles.py.
  profiles: ["classical", "hybrid_capable"]

resolve:
  dns_timeout_s: 5

enrich:
  # Tag each endpoint as CDN or origin using this ASN list.
  cdn_asns: config/registry/cdn_asns.yaml
  # Prebuilt pyasn database for IP -> ASN lookups (see scripts/download_asn_db.sh).
  # Leave blank to skip CDN attribution.
  asn_db: data/raw/ipasn.dat

concurrency:
  max_workers: 20
  # Politeness: pause between probes to the same host (seconds).
  per_host_delay_s: 0.0

output:
  results_csv: data/processed/results.csv
  results_jsonl: data/processed/results.jsonl
  figures_dir: data/processed/figures

registry:
  named_groups: config/registry/named_groups.yaml
  signature_algorithms: config/registry/signature_algorithms.yaml

logging:
  level: INFO
